<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Craig Young | 职业作品集</title>
    <link rel="stylesheet" href="styles.css">
    <script src="language.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" data-i18n-aria-label="homeLabel">Craig Young</a>
      <nav class="nav" data-i18n-aria-label="navLabel" aria-label="主导航">
        <a href="experiences.html" data-i18n="navExperiences">经历</a>
        <a href="thinking.html" data-i18n="navThinking">思考</a>
        <button class="language-toggle" type="button" data-language-toggle aria-label="Switch to English">EN</button>
      </nav>
    </header>

    <main id="top">
      <section class="hero">
        <p class="kicker" data-i18n="homeKicker">职业作品集</p>
        <h1 data-i18n="homeTitle">把职业经历，做成可以被浏览的产品。</h1>
        <p class="hero-text" data-i18n="homeIntro">
          每一段经历都浓缩成一个清晰案例：背景、挑战、方案、结果，以及我自己的复盘。
        </p>
      </section>

      <section class="statement">
        <p data-i18n="homeStatement">
          传统简历负责概括。这个网页负责展开。
          我希望让别人不用从大段文字里提炼信息，而是顺着我设计好的路径，看见每个项目的核心价值。
        </p>
      </section>

      <section id="products" class="product-showcase">
        <a class="product-card product-card-dark" href="experiences.html">
          <div class="product-copy">
            <p class="kicker" data-i18n="experienceKicker">职业经历</p>
            <h2 data-i18n="navExperiences">经历</h2>
            <p data-i18n="experienceCard">把每一段职业经历整理成一个可浏览的产品案例。</p>
          </div>
          <div class="product-visual" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </a>

        <a class="product-card product-card-blue product-card-wide" href="thinking.html">
          <div class="product-copy">
            <p class="kicker" data-i18n="thinkingKicker">持续沉淀</p>
            <h2 data-i18n="navThinking">思考</h2>
            <p data-i18n="thinkingCard">把工作中的复盘、判断和方法论持续沉淀下来。</p>
          </div>
        </a>
      </section>

    </main>
  </body>
</html>
