<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>读读说明书</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preload" href="assets/photography-demo-atlas.png" as="image">
    <link rel="stylesheet" href="styles.css?v=20260718-7">
    <script src="language.js?v=20260718-7" defer></script>
    <script src="photography.js?v=20260718-1" defer></script>
  </head>
  <body class="secondary-page photography-page">
    <header class="site-header">
      <a class="brand" href="index.html" data-i18n="brandName" data-i18n-aria-label="homeLabel">读读说明书</a>
      <nav class="nav" data-i18n-aria-label="navLabel" aria-label="主导航">
        <a href="experiences.html" data-i18n="navExperiences">旅程</a>
        <a href="thinking.html" data-i18n="navThinking">思考</a>
        <a href="photography.html" aria-current="page" data-i18n="navPhotography">摄影</a>
        <a href="about.html" data-i18n="navAbout">关于</a>
        <button class="language-toggle" type="button" data-language-toggle aria-label="切换至英文">
          <span data-language-option="zh">中</span><span data-language-option="en">EN</span>
        </button>
      </nav>
    </header>

    <main class="photography-main">
      <section class="photography-heading">
        <p class="kicker" data-i18n="lifeKicker">生活记录</p>
        <h1 data-i18n="navPhotography">摄影</h1>
      </section>

      <section class="photo-window" data-photo-window aria-label="照片画布" data-i18n-aria-label="photographyCanvasLabel">
        <div class="photo-canvas" data-photo-canvas></div>
        <div class="photo-window-vignette" aria-hidden="true"></div>
      </section>
    </main>

    <dialog class="photo-dialog" data-photo-dialog>
      <button class="photo-dialog-close" type="button" data-photo-close data-i18n-aria-label="closePhoto" aria-label="关闭照片">×</button>
      <div class="photo-dialog-image" data-photo-dialog-image role="img"></div>
      <div class="photo-dialog-meta">
        <p class="kicker" data-photo-dialog-location></p>
        <p data-photo-dialog-date></p>
      </div>
    </dialog>
    <footer class="site-footer">
      <p data-i18n="footerCopyright">© 2026 读读说明书</p>
    </footer>
  </body>
</html>
