    <main>
      <section class="page-hero">
        <p class="kicker">Structure</p>
        <h1>用同一套问题，讲清楚不同项目。</h1>
        <p class="hero-text">结构不是限制表达，而是帮读者更快抓到重点。</p>
      </section>

      <section class="story-section page-story">
        <div class="story-list">
          <article>
            <span>01</span>
            <h3>背景</h3>
            <p>为什么要做？当时处在什么业务阶段？</p>
          </article>
          <article>
            <span>02</span>
            <h3>挑战</h3>
            <p>真正困难的地方是什么？有哪些限制？</p>
          </article>
          <article>
            <span>03</span>
            <h3>方案</h3>
            <p>如何拆解问题？做了什么关键判断？</p>
          </article>
          <article>
            <span>04</span>
            <h3>结果</h3>
            <p>指标、效率、体验或业务有什么变化？</p>
          </article>
          <article>
            <span>05</span>
            <h3>复盘</h3>
            <p>这件事沉淀了什么能力和方法？</p>
          </article>
        </div>
      </section>
